<title>Organigrama - Area de Abastecimiento</title><style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#F8F9FA;}
.hdr{background:#fff;border-bottom:1px solid #E5E7EB;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.hdr-left{display:flex;align-items:center;gap:14px;}
.logo{height:44px;width:auto;object-fit:contain;}
.hdr-text .htitle{font-size:15px;font-weight:700;color:#111;}
.hdr-text .hmeta{font-size:11px;color:#9CA3AF;margin-top:2px;}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;background:#EDE9FE;color:#5B21B6;border:1px solid #C4B5FD;font-weight:600;white-space:nowrap;}
.tbar{padding:10px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fff;border-bottom:1px solid #F0F0F0;}
.fb{font-size:12px;padding:5px 13px;border-radius:20px;border:1.5px solid #E5E7EB;background:#fff;color:#6B7280;cursor:pointer;font-weight:500;}
.fa.on{border-color:#7C3AED;color:#4C1D95;background:#EDE9FE;}
.fdi.on{border-color:#E05252;color:#7F1D1D;background:#FFF1F0;}
.fc.on{border-color:#2563EB;color:#1E3A8A;background:#EFF6FF;}
.fl.on{border-color:#059669;color:#064E3B;background:#ECFDF5;}
.fp.on{border-color:#D97706;color:#78350F;background:#FFFBEB;}
.fpl.on{border-color:#DB2777;color:#831843;background:#FDF2F8;}
.leg{display:flex;gap:14px;flex-wrap:wrap;padding:9px 24px;background:#FAFAFA;border-bottom:1px solid #F0F0F0;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#6B7280;}
.ld{width:9px;height:9px;border-radius:50%;}
.cv{padding:28px 16px 48px;overflow-x:auto;}
.tr{display:flex;flex-direction:column;align-items:center;}
.nc{display:flex;flex-direction:column;align-items:center;}
.nd{width:138px;margin:0 8px;border-radius:10px;border:2px solid;padding:10px 8px 9px;cursor:default;transition:transform .15s,opacity .15s;text-align:center;background:#fff;}
.nd:hover{transform:translateY(-3px);}
.nd.fd{opacity:0.12;}
.nd.r{width:154px;}
.av{width:46px;height:46px;border-radius:50%;margin:0 auto 7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;border:2px solid;}
.nn{font-size:11px;font-weight:700;color:#111;line-height:1.35;}
.nc2{font-size:10px;color:#6B7280;margin-top:2px;line-height:1.3;}
.tg{font-size:9px;padding:2px 7px;border-radius:10px;margin-top:6px;display:inline-block;font-weight:700;}
.lv{width:2px;height:18px;background:#D1D5DB;margin:0 auto;}
.lh{height:2px;background:#D1D5DB;}
.cw{display:flex;justify-content:center;}
.tip{position:fixed;z-index:9999;background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:13px 15px;width:222px;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:0 8px 24px rgba(0,0,0,.10);}
.tip.on{opacity:1;}
.tn{font-size:13px;font-weight:700;color:#111;margin-bottom:2px;}
.tc{font-size:11px;color:#6B7280;margin-bottom:9px;padding-bottom:8px;border-bottom:1px solid #F0F0F0;}
.tl{font-size:9px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.tf{font-size:11px;color:#374151;display:flex;gap:5px;margin-bottom:4px;line-height:1.4;}
.ftr{text-align:center;padding:12px;font-size:11px;color:#9CA3AF;border-top:1px solid #F0F0F0;background:#fff;}
.sp{width:1px;height:18px;background:#E5E7EB;margin:0 2px;}
.ct{font-size:10px;color:#9CA3AF;margin-left:2px;}
